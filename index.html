<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EDMXVILLE - DREAM HOUSE</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      /* Background set to match your sky to prevent white flash */
      background: #ffca85; 
      font-family: system-ui, sans-serif;
    }
    .hint {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: 8px 14px;
      font-size: 12px;
      color: #e8e6e3;
      background: rgba(0, 0, 0, 0.55);
      border-radius: 8px;
      pointer-events: none;
      text-align: center;
      max-width: 90vw;
    }
    /* Ensure the canvas is visible immediately */
    canvas.a-canvas { opacity: 1 !important; }
  </style>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
</head>
<body>
  <a-scene
    renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true; exposure: 1.2; logarithmicDepthBuffer: true"
    loading-screen="enabled: false"
    vr-mode-ui="enabled: true"
  >
    <a-assets timeout="1">
      <a-asset-item id="mansionModel" src="assets/models/mansion/white_modern_mansion-v1.glb"></a-asset-item>
      <a-asset-item id="pavementModel" src="#"></a-asset-item>
      <a-asset-item id="dogModel" src="assets/models/animals/dog.glb"></a-asset-item>
      <a-asset-item id="flowerModel" src="assets/models/flowers/flower.glb"></a-asset-item>
      <img id="waterTex" src="assets/textures/water_ripple.jpg" crossorigin="anonymous" />
      <img id="grassTex" src="assets/textures/floor.jpg" crossorigin="anonymous" />
      <img id="sunsetSky" src="assets/textures/sky.png" crossorigin="anonymous" />
      <img id="starTex" src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/stars.jpg" crossorigin="anonymous" />
      <audio id="localChirp" src="assets/sounds/chirp.mp3" preload="auto" crossorigin="anonymous"></audio>
    </a-assets>

    <a-entity id="nightSound" sound="src: #localChirp; loop: true; volume: 2.0; autoplay: false; positional: false"></a-entity>

    <a-sky id="mainSky" src="#sunsetSky" rotation="0 -90 0"></a-sky>

    <a-sphere id="starLayer" 
              radius="500" 
              material="src: #starTex; side: back; transparent: true; opacity: 0; shader: flat" 
              visible="false"
              animation="property: rotation; to: 0 360 0; loop: true; dur: 500000; easing: linear">
    </a-sphere>

    <a-light id="ambLight" type="ambient" color="#ffecd2" intensity="1.2"></a-light>
    
    <a-light
      id="dirLight"
      type="directional"
      position="12 10 14"
      intensity="2.8" 
      color="#ffca85"
      cast-shadow="true"
      shadow-camera-far="120"
      shadow-camera-near="1"
      shadow-camera-left="-40"
      shadow-camera-right="40"
      shadow-camera-bottom="-40"
      shadow-camera-top="40"
      shadow-map-resolution="1024"
    ></a-light>

    <a-light id="hemiLight" type="hemisphere" color="#c5d8f0" ground-color="#4a4038" intensity="0.6"></a-light>

    <a-light id="frontGateLight" type="point" position="-23 7 -26" color="#fff" intensity="0" distance="15"></a-light>
    <a-light id="porchLight" type="point" position="-23 7 -16" color="#ffd1a3" intensity="0" distance="20"></a-light>
    <a-light id="poolGlow" type="point" position="-22 3 -42" color="#00e5ff" intensity="0" distance="20"></a-light>

    <a-entity id="pole1" position="-26 0 4">
      <a-cylinder color="#333" radius="0.1" height="14"></a-cylinder>
      <a-sphere position="0 7 0" radius="0.4" material="color: #fff; emissive: #fff; emissiveIntensity: 0" class="lamp-bulb"></a-sphere>
      <a-light class="street-light" type="point" position="0 7 0" color="#fff" intensity="0" distance="25"></a-light>
    </a-entity>
    <a-entity id="pole2" position="-17 0 4">
      <a-cylinder color="#333" radius="0.1" height="14"></a-cylinder>
      <a-sphere position="0 7 0" radius="0.4" material="color: #fff; emissive: #fff; emissiveIntensity: 0" class="lamp-bulb"></a-sphere>
      <a-light class="street-light" type="point" position="0 7 0" color="#fff" intensity="0" distance="25"></a-light>
    </a-entity>
    <a-entity id="pole3" position="-26 0 -5">
      <a-cylinder color="#333" radius="0.1" height="14"></a-cylinder>
      <a-sphere position="0 7 0" radius="0.4" material="color: #fff; emissive: #fff; emissiveIntensity: 0" class="lamp-bulb"></a-sphere>
      <a-light class="street-light" type="point" position="0 7 0" color="#fff" intensity="0" distance="25"></a-light>
    </a-entity>
    <a-entity id="pole4" position="-17 0 -5">
      <a-cylinder color="#333" radius="0.1" height="14"></a-cylinder>
      <a-sphere position="0 7 0" radius="0.4" material="color: #fff; emissive: #fff; emissiveIntensity: 0" class="lamp-bulb"></a-sphere>
      <a-light class="street-light" type="point" position="0 7 0" color="#fff" intensity="0" distance="25"></a-light>
    </a-entity>
    <a-entity id="pole5" position="-7 0 -13">
      <a-cylinder color="#333" radius="0.1" height="14"></a-cylinder>
      <a-sphere position="0 7 0" radius="0.4" material="color: #fff; emissive: #fff; emissiveIntensity: 0" class="lamp-bulb"></a-sphere>
      <a-light class="street-light" type="point" position="0 7 0" color="#fff" intensity="0" distance="25"></a-light>
    </a-entity>
    <a-entity id="pole6" position="-7 0 -30">
      <a-cylinder color="#333" radius="0.1" height="14"></a-cylinder>
      <a-sphere position="0 7 0" radius="0.4" material="color: #fff; emissive: #fff; emissiveIntensity: 0" class="lamp-bulb"></a-sphere>
      <a-light class="street-light" type="point" position="0 7 0" color="#fff" intensity="0" distance="25"></a-light>
    </a-entity>
    <a-entity id="pole7" position="-39 0 -13">
      <a-cylinder color="#333" radius="0.1" height="14"></a-cylinder>
      <a-sphere position="0 7 0" radius="0.4" material="color: #fff; emissive: #fff; emissiveIntensity: 0" class="lamp-bulb"></a-sphere>
      <a-light class="street-light" type="point" position="0 7 0" color="#fff" intensity="0" distance="25"></a-light>
    </a-entity>
    <a-entity id="pole8" position="-39 0 -30">
      <a-cylinder color="#333" radius="0.1" height="14"></a-cylinder>
      <a-sphere position="0 7 0" radius="0.4" material="color: #fff; emissive: #fff; emissiveIntensity: 0" class="lamp-bulb"></a-sphere>
      <a-light class="street-light" type="point" position="0 7 0" color="#fff" intensity="0" distance="25"></a-light>
    </a-entity>

    <a-plane
      rotation="-90 0 0"
      width="200"
      height="200"
      position="0 -0.05 0"
      material="src: #grassTex; repeat: 72 72; roughness: 0.92; metalness: 0; color: #ffffff"
      shadow="receive: true"
    ></a-plane>

    <a-plane 
      id="poolWater"
      position="-22 2.4 -42" 
      rotation="-90 0 0" 
      width="12" height="8"
      material="src: #waterTex; repeat: 4 4; transparent: true; opacity: 0.6; roughness: 0.1; metalness: 0.5"
      animation="property: material.offset; to: 1 1; dur: 15000; loop: true; easing: linear"
    ></a-plane>

    <a-entity gltf-model="#dogModel" position="-24.25 -0.05 -4" rotation="0 30 0" scale="0.5 0.5 0.5" animation-mixer shadow></a-entity>
    <a-entity gltf-model="#dogModel" position="-19.25 0 -4.43" rotation="0 0 0" scale="0.5 0.5 0.5" animation-mixer shadow></a-entity>
    <a-entity gltf-model="#flowerModel" position="-26.5 -0.05 4.77" rotation="0 45 0" scale="1.2 1.2 1.2" animation-mixer shadow></a-entity>
    <a-entity gltf-model="#flowerModel" position="-16.5 0 4.43" rotation="0 -45 0" scale="1.2 1.2 1.2" animation-mixer shadow></a-entity>

    <a-entity id="walkwayRoot" position="0 0 -4.5">
      <a-entity id="walkway" gltf-model="#pavementModel" position="0 0.02 0" rotation="0 90 0" scale="2.6 2.6 2.6" shadow="receive: true"></a-entity>
    </a-entity>

    <a-entity id="mansion" gltf-model="#mansionModel" position="0 0 -15" shadow="cast: true; receive: true"></a-entity>

    <a-entity id="rig" position="-23 0 13" rotation="0 0 0" wasd-controls="acceleration: 28; fly: true">
      <a-camera look-controls="pointerLockEnabled: false; touchEnabled: false" position="0 4.5 0" near="0.1" far="1000"></a-camera>
    </a-entity>
  </a-scene>

  <p class="hint">Sunset View · Tap Screen or Press "N" for Night Mode</p>

  <script>
    let isNight = false;
    const sky = document.querySelector('#mainSky');
    const stars = document.querySelector('#starLayer');
    const ambient = document.querySelector('#ambLight');
    const directional = document.querySelector('#dirLight');
    const hemi = document.querySelector('#hemiLight');
    const hintText = document.querySelector('.hint');
    const pLight = document.querySelector('#poolGlow');
    const fLight = document.querySelector('#frontGateLight');
    const prLight = document.querySelector('#porchLight');
    const streetLights = document.querySelectorAll('.street-light');
    const lampBulbs = document.querySelectorAll('.lamp-bulb');
    const nightSound = document.querySelector('#nightSound');

    window.addEventListener('click', () => {
        const event = new KeyboardEvent('keydown', {'key': 'n'});
        window.dispatchEvent(event);
    });

    window.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'n') {
        isNight = !isNight;
        
        if (isNight) {
          sky.setAttribute('src', ''); 
          sky.setAttribute('color', '#000015'); 
          stars.setAttribute('visible', 'true');
          stars.setAttribute('animation__fade', 'property: material.opacity; to: 1; dur: 2000');
          ambient.setAttribute('intensity', '0.4');
          ambient.setAttribute('color', '#4444ff');
          directional.setAttribute('intensity', '0.6');
          directional.setAttribute('color', '#7777ff');
          hemi.setAttribute('intensity', '0.2');
          pLight.setAttribute('intensity', '6');
          fLight.setAttribute('intensity', '6');
          prLight.setAttribute('intensity', '6');
          streetLights.forEach(light => light.setAttribute('intensity', '12'));
          lampBulbs.forEach(bulb => bulb.setAttribute('material', 'emissiveIntensity', '1'));
          if (nightSound.components.sound) nightSound.components.sound.playSound();
          hintText.innerText = 'Night Mode · Tap for Sunset View';
        } else {
          sky.setAttribute('src', '#sunsetSky');
          sky.setAttribute('color', '#ffffff');
          stars.setAttribute('visible', 'false');
          stars.setAttribute('material', 'opacity', '0');
          ambient.setAttribute('intensity', '1.2');
          ambient.setAttribute('color', '#ffecd2');
          directional.setAttribute('intensity', '2.8');
          directional.setAttribute('color', '#ffca85');
          hemi.setAttribute('intensity', '0.6');
          pLight.setAttribute('intensity', '0');
          fLight.setAttribute('intensity', '0');
          prLight.setAttribute('intensity', '0');
          streetLights.forEach(light => light.setAttribute('intensity', '0'));
          lampBulbs.forEach(bulb => bulb.setAttribute('material', 'emissiveIntensity', '0'));
          if (nightSound.components.sound) nightSound.components.sound.stopSound();
          hintText.innerText = 'Sunset View · Tap for Night Mode';
        }
      }
    });
  </script>
</body>
</html>
